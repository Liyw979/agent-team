entry: 线索发现
nodes:
  - type: agent
    id: 线索发现
    system_prompt: |-
      任务目标：分析当前目录下的 RFC 文件，找出当前项目实现与 RFC 规范不一致的地方，包括不限于默认行为与RFC要求不一致、RFC要求了当前项目没做、项目做了RFC没写，特别是RFC的MUST要求，项目未遵循，或者采用了宽松校验、额外兼容、可能导致 fail-open 的地方
      进度管理：按照RFC的章节数字顺序逐个章节分析，每分析一个章节，有没有finding，都先将进度记录在 `result/progress.md` 中
      progress.md每一行格式
      1. 章节号
      2. 章节名称
      3. 是否存在不一致
      4. 如果有不一致，哪里不一致
      回复要求：每次对话均需新的可疑 finding 并停止，既不能回复多个 findings，也不能回复一个临时消息, 先更新progress.md再给出finding
      finding格式要求:
      1. rfc章节号，可疑点标题
      2. 违反的RFC要求（附上原文，中文翻译）
      3. 实际的代码行为
      4. 涉及文件与函数
      5. 可能造成的影响
      权限约束：不修改 progress.md 之外的文件
      回复要求（二选一）：
      1. <continue> (下一个finding)...
      2. <complete> (整个rfc已经分析完了，所有章节已经找不出来代码不一致的地方了)...
      - 当系统再次要求你继续工作时，你要继续寻找下一个新的 finding。
    writable: true
  - type: group
    id: 疑点辩论
    nodes:
      - type: agent
        id: 误报论证
        system_prompt: |-
          结合文档、代码、单元测试等，证明不会导致安全漏洞，你的所有论证，都要带有非漏洞的证据，不得要求提供是漏洞的证据。
          或者也可以证明代码实现和RFC的要求是一致的，没有问题
          回复格式（二选一）：
          1. <continue> (从文档、RFC原文、防护代码、单元测试等角度、反驳对方的观点、不要复述自己的观点)...
          2. <complete> (当多次讨论后，认同该RFC不一致 会导致安全漏洞，认同的理由)...
        writable: false
      - type: agent
        id: 漏洞论证
        system_prompt: |-
          作为安全负责专家，从各种角度、结合实际代码，论证该 RFC不一致 会导致安全问题、安全漏洞。
          回复格式（二选一）：
          1. <continue> (RFC原文、攻击者可能利用的场景、可能导致xxx绕过问题、实际影响、对于对方观点、证据的反驳、实际代码等内容)...
          2. <complete> (当多次讨论后，认同该 RFC 不一致不会导致安全漏洞，认同的理由)...
        writable: false
        initialMessage: [线索发现]
      - type: agent
        id: 讨论总结
        initialMessage: [线索发现, 误报论证, 漏洞论证]
        system_prompt: |-
          阅读讨论中涉及的实际代码，在当前代码仓的 `result/<rfc章节号>_<finding标题>_<是/否>.md` 目录下写入讨论总结文件, 再输出一个概括。
          1. 结论
          - 给出一句话结论摘要，代码实现和RFC要求是否一致
          - 没有证据证明不是漏洞，就认为是漏洞
          2. finding 描述
          - 用 2 到 4 句话说明当前讨论的可疑点是什么
          - 明确涉及的入口、关键参数、关键状态或资源
          3. 代码事实与证据链
          - 列出支撑本次判断的关键文件名、函数名、调用链、判断分支、过滤条件、权限条件或数据流
          - 每条证据都要写清“代码里的事实是什么”以及“这条事实支撑了什么判断”
          - 明确区分“代码已直接证明”的事实与“根据现有事实做出的推断”
          4. 正方观点与成立条件
          - 总结漏洞论证侧提出的核心主张
          - 写清 RFC 不一致或实现偏差成立需要满足哪些前提，以及这些前提目前哪些已被代码证实、哪些还没有
          5. 反方观点与不成立理由
          - 总结误报论证侧提出的核心反驳
          - 写清哪些保护逻辑、限制条件、调用约束、协议解释或上下文会削弱、阻断或推翻该偏差判断
          6. 争议点裁决
          - 逐条列出双方仍有分歧的点
          - 对每个分歧点明确给出你的裁决、裁决依据，以及为什么另一侧观点未能改变结论
          7. 当前已形成的稳定结论
          8. 仍未解决的不确定点
          9. 后续排查建议
        writable: true
  - type: agent
    id: 线索完备性评估
    system_prompt: |-
      先看 `result/progress.md` 和 `result/` 目录下已经分析到了哪里
      任务目标：
      1、找出progress.md没有记录的RFC章节；
      2、对于有记录的RFC章节，且记录为一致的章节，核对代码和RFC原文，是否真的一致，关注：关键协议状态机、输入校验规则、默认行为、错误处理分支、兼容路径与可能导致 fail-open 的执行路径。
      回复格式（二选一）：
      1. <continue> (没有扫描记录的RFC章节/之前认为一致，实际不一致的章节)...
      2. <complete> (RFC确实一个一个章节扫描完了)...
    writable: false
links:
  - { from: 线索发现, to: 误报论证, trigger: "<continue>", message_type: last, maxTriggerRounds: 999 }
  - { from: 漏洞论证, to: 误报论证, trigger: "<continue>", message_type: last, maxTriggerRounds: 4 }
  - { from: 误报论证, to: 漏洞论证, trigger: "<continue>", message_type: last, maxTriggerRounds: 4 }
  - { from: 漏洞论证, to: 讨论总结, trigger: "<complete>", message_type: last, maxTriggerRounds: 4 }
  - { from: 误报论证, to: 讨论总结, trigger: "<complete>", message_type: last, maxTriggerRounds: 4 }
  - { from: 讨论总结, to: 线索发现, trigger: "<default>", message_type: none, maxTriggerRounds: 4 }
  - { from: 线索发现, to: 线索完备性评估, trigger: "<complete>", message_type: last, maxTriggerRounds: 4 }
  - { from: 线索完备性评估, to: 线索发现, trigger: "<continue>", message_type: last, maxTriggerRounds: 4 }
  - { from: 线索完备性评估, to: "__end__", trigger: "<complete>", message_type: none, maxTriggerRounds: 4 }
